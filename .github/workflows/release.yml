name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ==========================================
      # LINUX RUNNER: Build the standalone AppImage
      # ==========================================
      - name: Install AppImageTool (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo wget -O /usr/local/bin/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x ./gradlew
          ./gradlew jpackage

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QCSimple-Linux
          path: build/jpackage/*.AppImage

      # ==========================================
      # WINDOWS RUNNER: Build the standalone EXE
      # ==========================================
      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: ./gradlew createExe

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QCSimple-Windows
          path: build/launch4j/*.exe

  # ==========================================
  # RELEASE PIPELINE: Gather binaries and publish
  # ==========================================
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}