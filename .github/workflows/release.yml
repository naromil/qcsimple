name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ==========================================
      # LINUX RUNNER: Build the standalone AppImage
      # ==========================================
      - name: Install AppImageTool
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build Linux Runtime Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x ./gradlew
          ./gradlew jpackageImage

      - name: Create AppDir
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p AppDir/usr
          cp -r build/jpackage/QCSimple/* AppDir/usr/

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/QCSimple" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/qcsimple.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=QCSimple
          Exec=QCSimple
          Icon=qcsimple
          Categories=Utility;
          Terminal=false
          EOF

          cp src/main/resources/io/github/naromil/qcsimple/main/icon.png AppDir/qcsimple.png

      - name: Build AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool AppDir QCSimple-x86_64.AppImage

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QCSimple-Linux
          path: QCSimple-x86_64.AppImage
          if-no-files-found: error

      # ==========================================
      # WINDOWS RUNNER: Build the standalone EXE
      # ==========================================
      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: ./gradlew createExe

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QCSimple-Windows
          path: build/launch4j/libs/*.exe
          if-no-files-found: error

  # ==========================================
  # RELEASE PIPELINE: Gather binaries and publish
  # ==========================================
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}